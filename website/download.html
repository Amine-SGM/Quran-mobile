<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting to download</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        body {
            display: grid;
            place-items: center;
            min-height: 100vh;
            padding: 24px;
        }

        .redirect-card {
            max-width: 560px;
            width: 100%;
            text-align: center;
            background: rgba(26, 26, 46, 0.7);
            border: 1px solid rgba(255, 215, 0, 0.2);
            border-radius: 20px;
            padding: 32px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.35);
        }

        .redirect-card h1 {
            margin-bottom: 12px;
            font-size: 2rem;
        }

        .redirect-card p {
            color: #b0b0c0;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <main class="redirect-card">
        <h1 class="gold-gradient">Redirecting to latest APK</h1>
        <p>If the download does not start automatically, <a href="#" id="manual-link">click here</a>.</p>
        <p>Fetching the newest GitHub release now.</p>
    </main>

    <script>
        const repo = 'Amine-SGM/Quran-mobile';
        const manualLink = document.getElementById('manual-link');

        async function redirectToLatest() {
            try {
                const response = await fetch(`https://api.github.com/repos/${repo}/releases/latest`);
                if (!response.ok) throw new Error('Failed to load latest release');

                const release = await response.json();
                const asset = Array.isArray(release.assets)
                    ? release.assets.find(file => file.name.endsWith('.apk'))
                    : null;

                if (!asset) throw new Error('No APK asset found');

                manualLink.href = asset.browser_download_url;
                window.location.replace(asset.browser_download_url);
            } catch (error) {
                manualLink.href = 'https://github.com/Amine-SGM/Quran-mobile/releases/latest';
                manualLink.textContent = 'open the latest release page';
            }
        }

        redirectToLatest();
    </script>
</body>
</html>
