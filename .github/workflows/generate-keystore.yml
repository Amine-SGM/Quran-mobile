name: Generate Android Keystore

on:
  workflow_dispatch: # Allows you to run it manually from the Actions tab

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Create Keystore
        run: |
          # 🚨 The default password for this temporary key
          KEYSTORE_PASSWORD="changeit123"
          KEY_ALIAS="upload-alias"
          
          echo "Generating Keystore..."
          keytool -genkey -v -keystore my-release-key.jks \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -alias "$KEY_ALIAS" \
            -dname "CN=Quran Mobile, OU=Development, O=QuranMobile, L=Global, ST=Global, C=US" \
            -storepass "$KEYSTORE_PASSWORD" \
            -keypass "$KEYSTORE_PASSWORD"

          echo "--------------------------------------------------------"
          echo "✅ KEYSTORE GENERATED SUCCESSFULLY!"
          echo "--------------------------------------------------------"
          echo "Use these values for your GitHub Secrets:"
          echo ""
          echo "ANDROID_KEY_ALIAS: $KEY_ALIAS"
          echo "ANDROID_KEYSTORE_PASSWORD: $KEYSTORE_PASSWORD"
          echo "ANDROID_KEY_PASSWORD: $KEYSTORE_PASSWORD"
          echo "--------------------------------------------------------"
          echo "📋 COPY THE ENTIRE BASE64 STRING BELOW:"
          echo "--------------------------------------------------------"
          base64 -w 0 my-release-key.jks
          echo ""
          echo "--------------------------------------------------------"
          echo "🚨 IMPORTANT: Once you have copied the text above,"
          echo "add it to secrets and then DELETE THIS FILE."
