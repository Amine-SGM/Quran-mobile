name: Build Android APK

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r26b

      - name: Prepare Dummy Binaries
        run: |
          mkdir -p src-tauri/binaries
          
          # Host OS binaries required by Tauri build.rs
          touch src-tauri/binaries/ffmpeg-x86_64-unknown-linux-gnu
          touch src-tauri/binaries/ffprobe-x86_64-unknown-linux-gnu
          chmod +x src-tauri/binaries/ff*
          
          # Dummy emulator binaries to satisfy Gradle multi-architecture builds
          touch src-tauri/binaries/ffmpeg-i686-linux-android
          touch src-tauri/binaries/ffprobe-i686-linux-android
          touch src-tauri/binaries/ffmpeg-x86_64-linux-android
          touch src-tauri/binaries/ffprobe-x86_64-linux-android

      - name: Build Android APK
        env:
          NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: npm run tauri android build -- --apk

      - name: Upload APKs (Artifact)
        uses: actions/upload-artifact@v4
        with:
          name: app-android-apks
          path: src-tauri/gen/android/app/build/outputs/apk/**/*.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: src-tauri/gen/android/app/build/outputs/apk/**/*.apk
          generate_release_notes: true
