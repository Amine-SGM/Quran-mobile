name: Build Android APK

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      HAS_SIGNING_SECRETS: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' && secrets.ANDROID_KEYSTORE_PASSWORD != '' && secrets.ANDROID_KEY_ALIAS != '' && secrets.ANDROID_KEY_PASSWORD != '' }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r26b

      - name: Prepare Dummy Binaries
        run: |
          mkdir -p src-tauri
          touch src-tauri/ffmpeg-aarch64-linux-android
          touch src-tauri/ffmpeg-armv7-linux-androideabi
          touch src-tauri/ffmpeg-i686-linux-android
          touch src-tauri/ffmpeg-x86_64-linux-android
          touch src-tauri/ffprobe-aarch64-linux-android
          touch src-tauri/ffprobe-armv7-linux-androideabi
          touch src-tauri/ffprobe-i686-linux-android
          touch src-tauri/ffprobe-x86_64-linux-android
          # Satisfy Windows identifiers if checked by Tauri
          touch src-tauri/ffmpeg-x86_64-pc-windows-msvc.exe
          touch src-tauri/ffprobe-x86_64-pc-windows-msvc.exe

      - name: Setup Android Signing
        if: env.HAS_SIGNING_SECRETS == 'true'
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          echo "storeFile=$RUNNER_TEMP/my-release-key.jks" > src-tauri/gen/android/keystore.properties
          echo "storePassword=$ANDROID_KEYSTORE_PASSWORD" >> src-tauri/gen/android/keystore.properties
          echo "keyPassword=$ANDROID_KEY_PASSWORD" >> src-tauri/gen/android/keystore.properties
          echo "keyAlias=$ANDROID_KEY_ALIAS" >> src-tauri/gen/android/keystore.properties
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/my-release-key.jks"

      - name: Build Android APK
        env:
          NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: npm run tauri android build -- --apk

      - name: Collect Release APKs
        run: |
          mkdir -p android-release-apks
          shopt -s nullglob
          apk_count=0

          for apk in src-tauri/gen/android/app/build/outputs/apk/release/*.apk; do
            if [ "$HAS_SIGNING_SECRETS" = "true" ] && [[ "$apk" == *-unsigned.apk ]]; then
              continue
            fi

            cp "$apk" android-release-apks/
            apk_count=$((apk_count + 1))
          done

          if [ "$apk_count" -eq 0 ]; then
            if [ "$HAS_SIGNING_SECRETS" = "true" ]; then
              echo "Signing secrets were provided, but no signed release APKs were produced."
            else
              echo "No release APKs were produced."
            fi
            exit 1
          fi

      - name: Upload APKs (Artifact)
        uses: actions/upload-artifact@v4
        with:
          name: app-android-apks
          path: android-release-apks/*.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: android-release-apks/*.apk
          generate_release_notes: true
